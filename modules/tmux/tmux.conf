# Set escape char to Ctrl-J
set-option -g prefix C-j
unbind-key C-b
bind-key -N 'Send Ctrl-J' C-j send-prefix

# * Neovim will detect tmux and use `load-buffer -w` when doing a yank to the
#   system clipboard ("+y). https://neovim.io/doc/user/provider/.
# * tmux defaults to set-clipboard external which apparently ignores
#   application osc52 messages to set the system clipboard
# * If I have a tmux sesion on my laptop, in that tmux session I ssh to
#   another server, I start a tmux there, I use nvim there, and in that nvim I
#   use "+y, it will do the `load-buffer -w` thing. This will send an osc52
#   message to the laptop tmux, but with set-clipboard to external, it will be
#   ignored. With this set to on, osc52 messages from nvim, tmux, or any other
#   cli programs can properly set the system cliboard (but not read from it of
#   course)
set-option -g set-clipboard on

# Reduce delay after pressing Escape (default 500ms, too slow for vi mode)
set-option -sg escape-time 10

# Scrollback buffer size (default 2000)
set-option -g history-limit 100000

# When a window is closed, shift the rest down to remove gap in numbers
set -g renumber-windows on

# Let programs set the window name (used by settitle in bash config)
set -g allow-rename on

# Vi mode
set-window-option -g mode-keys vi

# Advertise modern terminal capabilities (italics, strikethrough, 256 color)
set -g default-terminal "tmux-256color"

# Custom help sorting. Keep upper- and lower-case characters together
bind-key -N 'List keys' ? run-shell "tmux list-keys -N | awk '{key=\$2; if(key~/^.\$/){print tolower(key), \$0}else{print \"ZZZ\" NR, \$0}}' | sort | cut -d' ' -f2-"

# The above one-liner, but readable:
# tmux list-keys -N | awk '
# {
#   key = $2
#   # If the key starts with a letter, let sort handle it
#   if (key ~ /^.$/) { print tolower(key), $0 }
#   # If the key is multiple characters, sort to the bottom (ZZZ) and print the
#   # line number to preserve the tmux order
#   else { print "ZZZ" NR, $0 }  # modifiers and special keys get "1" prefix
# }' | sort | cut -d' ' -f2-

# If I ssh in and re-attach an old tmux session, update the SSH agent env var
set-option -g update-environment "SSH_AUTH_SOCK"

# Sessions naming
bind-key -N 'List sessions (by name)' s choose-tree -sZ -O name
bind-key -N 'Create session (with name)' S command-prompt "new-session -s '%%'"

# Move windows around easier
bind-key -N 'Move window left' -r S-Left swap-window -t -1\; select-window -t -1
bind-key -N 'Move window right' -r S-Right swap-window -t +1\; select-window -t +1

# URL opener
bind-key -N 'URL opener' z run tmux-url-select.pl

# Scroll the buffer with the mouse wheel
set -g mouse on

# Setup 'v' to begin selection as in Vim
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy'

# Don't detach when closing the last window in a session
set-option -g detach-on-destroy off

# Pane joining
bind-key -N 'Join selected pane (horizontal)' j command-prompt "join-pane -t '%%'"
bind-key -N 'Join selected pane (vertical)' J command-prompt "join-pane -h -t '%%'"

# Status bar stuff
# default to terminal's bg color (works with transparency)
set-option -g status-style fg=white,bg=default
set-option -g status-left-length 38
# '#h' is hostname - '#S' is session name
set-option -g status-left "#[fg=green][#[fg=magenta]#{user}#[fg=green]@#[fg=cyan]#h#[fg=green]][#[fg=red]#S#[fg=green]]["
# the printf is hex time - '%a' is day of week, '%m/%d' is month/day
# I like pane height on the status line to make copy mode with vi mode keys easier. If I see the pane height is 100, I can do '50k' to go halfway up
set-option -g status-right "#[fg=green]][#[fg=red]#{pane_height}#[fg=green]][#[fg=yellow]#(printf '0x%%02X:%%02X' %-H %-M)#[fg=blue]%a#[fg=green]%m/%d]"
set-option -g status-justify centre
set-option -g message-style bg=yellow,fg=black
set-window-option -g window-status-current-style bg=red
set-window-option -g window-status-style bg=colour237
